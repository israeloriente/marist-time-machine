# =====================================================================
# Dev-only overrides. Loaded automatically by `docker compose up`.
# In Coolify production, this file is NOT used (Coolify only reads
# docker-compose.yml and applies its own routing via Traefik).
# =====================================================================

services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  kong:
    ports:
      - "8000:8000"
      - "8443:8443"

  studio:
    ports:
      - "3001:3000"

  ml:
    ports:
      - "${ML_PORT:-8081}:8081"

  api:
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./api/app:/app/app:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]

  web:
    ports:
      - "5173:80"
