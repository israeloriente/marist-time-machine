server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed assets
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the service worker or manifest
    location ~* (sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
    }
}
