# =====================================================================
# Marist Time Machine — Coolify compose
# Use this when deploying to a Coolify instance that already has Supabase
# running as a separate Resource (via the Supabase one-click template).
#
# This compose only contains the app services (api, ml, web). They consume
# the external Supabase instance via env vars.
#
# Required env vars (set in Coolify UI):
#   SUPABASE_URL              — internal URL of the Supabase Kong (e.g. http://supabase-kong-<id>:8000)
#   SUPABASE_PUBLIC_URL       — public URL of Supabase (e.g. https://supabase.example.com)
#   JWT_SECRET                — same secret used by the Supabase resource
#   ANON_KEY, SERVICE_ROLE_KEY — generated by Supabase resource
#   DATABASE_URL              — postgres://postgres:<pw>@<supabase-db-host>:5432/postgres
#   SERVICE_FQDN_WEB          — FQDN for the PWA (Coolify magic var)
#   SERVICE_FQDN_API          — FQDN for the API (Coolify magic var)
# =====================================================================

services:
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ML_HOST: 0.0.0.0
      ML_PORT: 8081
      ML_MODEL_NAME: ${ML_MODEL_NAME:-buffalo_l}
      ML_DET_THRESHOLD: ${ML_DET_THRESHOLD:-0.7}
      ML_DET_SIZE: ${ML_DET_SIZE:-640}
    volumes:
      - ml-models:/root/.insightface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ml:
        condition: service_started
    environment:
      # Coolify magic var → public FQDN (e.g. api.62-238-25-116.sslip.io)
      SERVICE_FQDN_API_8080: ${SERVICE_FQDN_API_8080}
      API_HOST: 0.0.0.0
      API_PORT: 8080
      # Database (Supabase external)
      DATABASE_URL: ${DATABASE_URL}
      # Auth (must match Supabase resource)
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      # Inter-service
      ML_INTERNAL_URL: http://ml:8081
      # Clustering tunables
      CLUSTER_MAX_DISTANCE: ${CLUSTER_MAX_DISTANCE:-0.5}
      CLUSTER_MIN_FACES: ${CLUSTER_MIN_FACES:-3}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    networks:
      - default
      - supabase
    expose:
      - "8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
        VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
        VITE_API_URL: ${VITE_API_URL}
    environment:
      SERVICE_FQDN_WEB_80: ${SERVICE_FQDN_WEB_80}
    restart: unless-stopped
    expose:
      - "80"

volumes:
  ml-models:

networks:
  default:
  supabase:
    external: true
    name: lol5m2y3hmrgijlj9qt7h5mo
